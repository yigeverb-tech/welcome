<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>一个动词 · Una Verba</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --pink: #E040FB;
  --purple: #7B1FA2;
  --pink-light: #FCE4FF;
  --purple-light: #EDE7F6;
  --text: #1a1a1a;
  --text-mid: #555;
  --text-soft: #888;
  --bg: #FDFCFF;
  --border: rgba(123,31,162,0.12);
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); font-family: 'Noto Sans SC', sans-serif; color: var(--text); }
.app { max-width: 420px; min-height: 100vh; margin: 0 auto; position: relative; background: var(--bg); }
.screen { display: none; min-height: 100vh; padding: 0 0 80px; animation: fadeUp 0.3s ease; }
.screen.active { display: block; }
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

/* LANG SWITCHER */
.lang-switcher {
  position: absolute;
  top: 18px; left: 70px;
  display: flex;
  gap: 4px;
  z-index: 20;
}
.lang-btn {
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text-soft);
  transition: all 0.15s;
}
.lang-active {
  background: var(--purple);
  color: #fff;
  border-color: var(--purple);
}

/* TOPBAR */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 14px;
  position: sticky; top: 0;
  background: var(--bg); z-index: 10;
  border-bottom: 1px solid var(--border);
}
.logo-mark {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
}
.back-btn {
  display: flex; align-items: center; gap: 4px;
  font-size: 13px; color: var(--text-soft);
  background: none; border: none; cursor: pointer; padding: 4px 0;
}
.back-btn svg { width: 16px; height: 16px; }
.pad { padding: 28px 24px; }
.section-tag {
  display: inline-block; font-size: 10px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--purple); background: var(--purple-light);
  padding: 4px 12px; border-radius: 999px; margin-bottom: 14px;
}
.section-title {
  font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 600;
  color: var(--text); line-height: 1.4; margin-bottom: 16px;
}
.body-text { font-size: 14px; line-height: 1.9; color: var(--text-mid); margin-bottom: 14px; }

/* WELCOME */
.welcome-wrap {
  min-height: 100vh;
  background: linear-gradient(160deg, #fff0fc 0%, #ede7f6 50%, #fce4ff 100%);
  display: flex; flex-direction: column; align-items: center;
  padding: 56px 28px 40px;
}
.welcome-top { display: flex; flex-direction: column; align-items: center; margin-bottom: 32px; }
.welcome-brand { font-size: 17px; font-weight: 500; color: var(--purple); margin-top: 10px; }
.welcome-city { font-size: 12px; color: var(--text-soft); margin-top: 3px; letter-spacing: 0.1em; }
.welcome-card {
  background: rgba(255,255,255,0.75); backdrop-filter: blur(12px);
  border-radius: 20px; padding: 28px 24px; margin-bottom: 28px; width: 100%;
  border: 1px solid rgba(224,64,251,0.12);
}
.welcome-title {
  font-family: 'Noto Serif SC', serif; font-size: 30px; font-weight: 600;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 20px; line-height: 1.2;
}
.welcome-body { font-size: 15px; line-height: 1.9; color: #444; margin-bottom: 14px; }
.highlight {
  background: linear-gradient(135deg, rgba(224,64,251,0.15), rgba(123,31,162,0.1));
  border-radius: 4px; padding: 1px 4px;
  -webkit-text-fill-color: var(--purple); font-weight: 500;
}
.emoji-line { font-size: 22px; letter-spacing: 6px; margin: 20px 0 10px; text-align: center; }
.open-text { font-size: 13px; color: var(--purple); text-align: center; line-height: 1.6; opacity: 0.85; }
.btn-primary {
  display: block; width: 100%; padding: 16px; border-radius: 999px;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: #fff; font-size: 15px; font-weight: 500;
  font-family: 'Noto Sans SC', sans-serif; border: none; cursor: pointer;
}
.btn-primary:active { opacity: 0.85; }

/* VALUES */
.value-list { margin-top: 8px; }
.value-item { display: flex; gap: 14px; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid var(--border); }
.value-item:last-child { border-bottom: none; }
.value-dot { width: 7px; height: 7px; border-radius: 50%; background: linear-gradient(135deg, var(--pink), var(--purple)); flex-shrink: 0; margin-top: 8px; }
.value-text { font-size: 14px; color: var(--text); line-height: 1.7; }

/* CHOICES */
.choice-grid { display: flex; flex-direction: column; gap: 14px; margin-top: 20px; }
.choice-card {
  background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; cursor: pointer; text-align: left; width: 100%;
  position: relative; overflow: hidden; transition: border-color 0.2s, box-shadow 0.2s;
}
.choice-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
  background: linear-gradient(180deg, var(--pink), var(--purple)); opacity: 0; transition: opacity 0.2s;
}
.choice-card:hover { border-color: var(--pink); box-shadow: 0 4px 20px rgba(224,64,251,0.08); }
.choice-card:hover::before { opacity: 1; }
.choice-emoji { font-size: 24px; margin-bottom: 10px; display: block; }
.choice-title { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
.choice-desc { font-size: 13px; color: var(--text-soft); line-height: 1.6; }
.choice-arrow { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--text-soft); font-size: 18px; }

/* STEPS */
.step-flow { margin: 20px 0; }
.step-row { display: flex; gap: 16px; }
.step-line-col { display: flex; flex-direction: column; align-items: center; width: 32px; flex-shrink: 0; }
.step-circle {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--pink-light); border: 1.5px solid var(--pink);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 500; color: var(--purple); flex-shrink: 0;
}
.step-line { width: 1.5px; flex: 1; min-height: 20px; background: linear-gradient(var(--pink-light), var(--purple-light)); margin: 4px 0; }
.step-body { padding-bottom: 20px; flex: 1; }
.step-body h4 { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 5px; padding-top: 5px; }
.step-body p { font-size: 13px; color: var(--text-mid); line-height: 1.7; }
.step-note {
  display: inline-block; font-size: 11px; color: var(--purple);
  background: var(--purple-light); padding: 3px 10px; border-radius: 999px; margin-top: 6px; line-height: 1.6;
}

/* ACTIVITIES */
.activity-list { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
.activity-card {
  background: #fff; border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 14px 16px; display: flex; gap: 12px; align-items: flex-start;
}
.activity-emoji { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
.activity-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.activity-desc { font-size: 12px; color: var(--text-soft); line-height: 1.6; }

/* TRY BTN */
.try-btn {
  width: 100%; padding: 16px; border-radius: var(--radius);
  border: 2px dashed var(--pink); background: var(--pink-light);
  color: var(--purple); font-size: 14px; font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer; margin: 24px 0; line-height: 1.5; transition: background 0.2s;
}
.try-btn:hover { background: #F8C0FF; }

/* CTA */
.cta-card {
  background: linear-gradient(135deg, #FCE4FF, #EDE7F6);
  border-radius: var(--radius); padding: 24px; margin-top: 16px;
}
.cta-title { font-size: 16px; font-weight: 500; color: var(--purple); margin-bottom: 6px; }
.cta-body { font-size: 13px; color: var(--text-mid); line-height: 1.7; margin-bottom: 16px; }

/* JOIN */
.join-step {
  display: flex; gap: 14px; align-items: center; padding: 16px;
  background: #fff; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 10px;
}
.join-num {
  width: 36px; height: 36px; border-radius: 50%; background: var(--pink-light);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 500; color: var(--purple); flex-shrink: 0;
}
.join-info h4 { font-size: 14px; font-weight: 500; color: var(--text); }
.join-info p { font-size: 12px; color: var(--text-soft); margin-top: 2px; }

/* MEMBER */
.req-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin: 16px 0; }
.req-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 14px; }
.req-item { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; font-size: 13px; color: var(--text-mid); line-height: 1.5; }
.req-check { color: var(--pink); font-size: 14px; flex-shrink: 0; }

/* BOTTOM BAR */
.bottom-bar {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 420px;
  background: rgba(253,252,255,0.95); backdrop-filter: blur(10px);
  border-top: 1px solid var(--border); padding: 12px 24px 20px;
  display: flex; gap: 10px;
}
.bnav {
  flex: 1; padding: 12px; border-radius: var(--radius-sm); font-size: 13px;
  font-family: 'Noto Sans SC', sans-serif; cursor: pointer;
  border: 1px solid var(--border); background: #fff; color: var(--text-mid);
}
.bnav:hover { background: var(--purple-light); }

/* XIAOHUA */
.xh-progress { padding: 16px 24px 0; display: flex; gap: 5px; }
.xh-dot { flex: 1; height: 3px; border-radius: 2px; background: var(--border); transition: background 0.3s; }
.xh-dot.done { background: var(--pink); }
.xh-dot.current { background: linear-gradient(90deg, var(--pink), var(--purple)); }
.xh-card { margin: 16px 24px 0; background: #fff; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.xh-mood-bar { background: linear-gradient(135deg, var(--pink-light), var(--purple-light)); padding: 20px 24px 16px; text-align: center; }
.xh-mood { font-size: 36px; margin-bottom: 8px; }
.xh-mood-label { font-size: 12px; color: var(--purple); font-weight: 500; letter-spacing: 0.08em; }
.xh-body { padding: 20px 20px 24px; }
.xh-thought {
  font-family: 'Noto Serif SC', serif; font-size: 15px; color: var(--text);
  line-height: 1.9; margin-bottom: 16px; padding-left: 14px; border-left: 3px solid var(--pink);
}
.xh-action-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--purple); margin-bottom: 8px; }
.xh-action { font-size: 13px; color: var(--text-mid); line-height: 1.8; margin-bottom: 20px; }
.xh-next {
  width: 100%; padding: 14px; border-radius: 999px;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: #fff; font-size: 14px; font-weight: 500;
  font-family: 'Noto Sans SC', sans-serif; border: none; cursor: pointer;
}
.xh-step-count { font-size: 12px; color: var(--text-soft); text-align: center; margin-top: 10px; }

/* SAFETY ENTRY BTN */
.safety-entry {
  width: 100%; margin-top: 24px; padding: 16px; border-radius: var(--radius);
  border: 1px solid var(--border); background: #fff;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; font-family: 'Noto Sans SC', sans-serif;
}

a { color: var(--purple); text-decoration: none; }
a:hover { text-decoration: underline; }
</style>
</head>

}

  ).join('');

  document.getElementById('saf-back').textContent = d.saf_back;

  document.getElementById('cho-tag').textContent = d.cho_tag;
  document.getElementById('cho-title').textContent = d.cho_title;

function renderJoin() {

  document.getElementById('joi-tag').textContent = d.joi_tag;
  document.getElementById('joi-title').textContent = d.joi_title;
  const list = document.getElementById('joi-list');
  const links = ['https://www.instagram.com/unaverba2024/', 'https://chat.whatsapp.com/GnoVBgyBRl81wts5UsIXU0', null];
  list.innerHTML = d.joi_steps.map(([title, sub], i) => `
    <div class="join-step">
      <div class="join-num">${i+1}</div>

function renderLaunch() {
  const d = T[lang];

  document.getElementById('lau-title').textContent = d.lau_title;
  document.getElementById('lau-p1').textContent = d.lau_p1;

  document.getElementById('mem-p').textContent = d.mem_p;
  document.getElementById('mem-req-title').textContent = d.mem_req_title;
  const reqs = document.getElementById('mem-reqs');

  document.getElementById('mem-how-title').textContent = d.mem_how_title;
  document.getElementById('mem-how-body').textContent = d.mem_how_body;

function renderAll() {
  renderWelcome();
  renderValues();
  renderSafety();
  renderChoices();
  renderJoin();
  renderLaunch();
  renderMember();
  // update all back buttons
  document.querySelectorAll('.back-btn-label').forEach(el => {
    el.textContent = T[lang].nav_back;
  });
  document.querySelectorAll('.back-btn-values-label').forEach(el => {
    el.textContent = T[lang].nav_back_values;
  });
  // update xh screen title/sub
  document.getElementById('xh-screen-title').textContent = T[lang].xh_title;
  document.getElementById('xh-screen-sub').textContent = T[lang].xh_sub;
}

function switchLang(l) {
  lang = l;
  document.getElementById('lang-zh').classList.toggle('lang-active', l === 'zh');
  document.getElementById('lang-es').classList.toggle('lang-active', l === 'es');
  renderAll();
  if (currentScreen === 's-xiaohua') { cur = 0; renderXH(); }
}

// ── NAVIGATION ────────────────────────────────────────
let currentScreen = 's-welcome';
function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  currentScreen = id;
  if (id === 's-xiaohua') { cur = 0; renderXH(); }
  window.scrollTo(0, 0);
}

// ── XIAOHUA / LILA ────────────────────────────────────
let cur = 0;
function renderXH() {
  const steps = T[lang].xh_steps;
  const s = steps[cur];
  const dots = document.getElementById('xh-dots');
  dots.innerHTML = steps.map((_, i) =>
    `<div class="xh-dot ${i < cur ? 'done' : i === cur ? 'current' : ''}"></div>`
  ).join('');
  const c = document.getElementById('xh-content');
  c.innerHTML = `
    <div class="xh-card" style="margin:16px 24px 0">
      <div class="xh-mood-bar">
        <div class="xh-mood">${s.mood}</div>
        <div class="xh-mood-label">${s.label}</div>
      </div>
      <div class="xh-body">
        <div class="xh-thought">${s.thought}</div>
        <div class="xh-action-label">${s.label}</div>
        <div class="xh-action">${s.action}</div>
        ${s.last
          ? `<a href="https://forms.gle/1Yhk8d3XPN7TE7Sq7" target="_blank"><button class="xh-next">${s.btn}</button></a>
             <button class="xh-next" onclick="cur=0;renderXH()" style="margin-top:10px;background:#fff;color:var(--purple);border:1.5px solid var(--purple)">${lang==='zh'?'还是不明白，再看一次':'No me queda claro, ver de nuevo'}</button>`
          : `<button class="xh-next" onclick="nextXH()">${s.btn}</button>`
        }
        <div class="xh-step-count">${lang==='zh'?'第':'Paso'} ${cur + 1} ${lang==='zh'?'步 / 共':' / '} ${steps.length} ${lang==='zh'?'步':''}</div>
      </div>
    </div>`;
}

function nextXH() {
  const steps = T[lang].xh_steps;
  if (cur < steps.length - 1) { cur++; renderXH(); window.scrollTo(0, 0); }
}

// ── INIT ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  renderAll();
});

</script>
